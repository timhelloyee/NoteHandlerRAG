<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NoteHandlerRAG</title>
  <style>
    :root {
      --card: #ffffff;
      --ink: #1f2430;
      --muted: #6b7280;
      --border: #e6e8ef;
      --accent: #4f46e5;
      --accent-2: #2563eb;
      --danger: #dc2626;
      --radius: 14px;
      --shadow: 0 1px 2px rgba(16,24,40,.04), 0 8px 24px rgba(16,24,40,.06);
      font-family: system-ui, "Segoe UI", "Noto Sans TC", sans-serif;
    }
    * { box-sizing: border-box; }
    body {
      max-width: 780px; margin: 0 auto; padding: 2.5rem 1.25rem 4rem;
      color: var(--ink); line-height: 1.6; min-height: 100vh;
      background: linear-gradient(180deg, #e9eefb 0%, #f6f8fc 260px, #f6f8fc 100%);
    }

    /* Header */
    .app-header { text-align: center; margin-bottom: 2rem; }
    .app-header h1 {
      font-size: 2.1rem; margin: 0 0 .35rem; font-weight: 800; letter-spacing: -.02em;
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
      -webkit-background-clip: text; background-clip: text; color: transparent;
    }
    .tagline { color: var(--muted); margin: 0; font-size: .95rem; }

    /* Cards */
    section {
      background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 1.3rem 1.4rem; margin-bottom: 1.25rem; box-shadow: var(--shadow);
    }
    label { font-weight: 600; display: block; margin-bottom: .45rem; font-size: .95rem; }

    /* Inputs */
    input, textarea, button { font: inherit; }
    input[type=text], textarea {
      width: 100%; padding: .65rem .8rem; border: 1px solid var(--border); border-radius: 10px;
      background: #fbfcfe; transition: border-color .15s, box-shadow .15s;
    }
    input[type=text]:focus, textarea:focus {
      outline: none; border-color: var(--accent-2); box-shadow: 0 0 0 3px rgba(37,99,235,.15);
    }
    textarea { min-height: 90px; resize: vertical; }
    input[type=file] {
      width: 100%; padding: .55rem; border: 1px dashed var(--border); border-radius: 10px;
      background: #fbfcfe; cursor: pointer;
    }
    input[type=file]::file-selector-button {
      margin-right: .8rem; padding: .4rem .8rem; border: 0; border-radius: 8px;
      background: #eef2ff; color: var(--accent); font-weight: 600; cursor: pointer;
    }

    /* Buttons */
    button {
      margin-top: .6rem; padding: .6rem 1.2rem; border: 0; border-radius: 10px;
      background: linear-gradient(180deg, var(--accent), var(--accent-2)); color: #fff;
      font-weight: 600; cursor: pointer; box-shadow: 0 1px 2px rgba(37,99,235,.3);
      transition: transform .08s, box-shadow .15s;
    }
    button:hover { box-shadow: 0 4px 14px rgba(37,99,235,.35); }
    button:active { transform: translateY(1px); }
    button:disabled { background: #aab6e6; cursor: default; box-shadow: none; }
    #refreshBtn { background: #eef2ff; color: var(--accent); box-shadow: none; }
    #refreshBtn:hover { background: #e0e7ff; box-shadow: none; }

    /* Answer */
    #answer {
      background: #f7f9fc; border: 1px solid var(--border); border-radius: 10px;
      padding: 1rem 1.1rem; margin-top: .75rem; min-height: 1rem; overflow-x: auto;
    }
    #answer:empty { display: none; }
    #answer p { margin: .5rem 0; }
    #answer ul, #answer ol { margin: .5rem 0; padding-left: 1.4rem; }
    #answer li { margin: .15rem 0; }
    #answer p:first-child, #answer h1:first-child, #answer h2:first-child, #answer h3:first-child, #answer ul:first-child, #answer ol:first-child { margin-top: 0; }
    #answer p:last-child, #answer ul:last-child, #answer ol:last-child { margin-bottom: 0; }
    #answer pre { background: #ececf3; padding: .6rem; border-radius: 8px; overflow-x: auto; }
    #answer code { background: #ececf3; padding: .1rem .3rem; border-radius: 4px; }
    #answer pre code { background: none; padding: 0; }

    .row { display: flex; gap: .5rem; align-items: end; }
    .muted { color: var(--muted); font-size: .85rem; }
    .divider { border: 0; border-top: 1px solid var(--border); margin: 1.4rem 0; }

    /* Notes list */
    ul { padding-left: 0; list-style: none; margin: .5rem 0 0; }
    #notes li {
      display: flex; justify-content: space-between; align-items: center; gap: .75rem;
      padding: .6rem .2rem; border-bottom: 1px solid var(--border);
    }
    #notes li:last-child { border-bottom: 0; }
    #notes li.muted { border-bottom: 0; justify-content: flex-start; }
    #notes .meta { word-break: break-word; font-size: .9rem; }
    button.del {
      margin-top: 0; padding: .35rem .75rem; font-size: .8rem; flex: none;
      background: #fff; color: var(--danger); border: 1px solid #f1c4c4; box-shadow: none;
    }
    button.del:hover { background: var(--danger); color: #fff; border-color: var(--danger); box-shadow: 0 3px 10px rgba(220,38,38,.3); }
  </style>
  <script>
    // MathJax must be configured before its script loads.
    window.MathJax = {
      tex: {
        inlineMath: [["$", "$"], ["\\(", "\\)"]],
        displayMath: [["$$", "$$"], ["\\[", "\\]"]],
      },
      options: { skipHtmlTags: ["script", "noscript", "style", "textarea", "pre", "code"] },
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js" async></script>
  <script src="https://accounts.google.com/gsi/client" async></script>
</head>
<body>
  <header class="app-header">
    <h1>📒 NoteHandlerRAG</h1>
    <p class="tagline">多模態筆記檢索 · 文字、圖片與 PDF 智慧問答</p>
  </header>

  <section>
    <label>Google 帳號</label>
    <div id="gsiButton"></div>
    <p id="googleStatus" class="muted">使用 Google 登入即可用你的帳號 Email 作為使用者。
      <a id="signoutLink" href="#" style="display:none">登出</a></p>
    <input type="hidden" id="user" value="">
  </section>

  <section>
    <label for="question">問問題</label>
    <textarea id="question" placeholder="輸入問題，例如：輸出每一個科目統整後的筆記內容"></textarea>
    <button id="askBtn">送出</button>
    <div id="answer"></div>
  </section>

  <section>
    <label>已儲存的筆記</label>
    <p class="muted">切換上方使用者即可看到該使用者儲存的筆記。</p>
    <ul id="notes"></ul>
    <button id="refreshBtn">重新整理</button>

    <hr class="divider">
    <label for="file">上傳筆記 (.txt / .md / 圖片 / PDF)</label>
    <input type="file" id="file" accept=".txt,.md,.jpg,.jpeg,.png,.webp,.gif,.pdf">
    <div><button id="uploadBtn">上傳</button></div>
    <div id="uploadResult" class="muted"></div>
  </section>

  <script>
    const $ = (id) => document.getElementById(id);
    const userId = () => $("user").value.trim();

    // Backend base URL: on GitHub Pages, point at the Hugging Face Space; otherwise
    // (served by FastAPI locally or on the Space itself) use same-origin relative paths.
    const API_BASE = location.hostname.endsWith("github.io")
      ? "https://timhelloyee-notehandler.hf.space"   // Hugging Face Space backend
      : "";

    // Pull a readable message from a JSON error body (detail may be a string, an
    // object/array, or absent) so we never render the useless "[object Object]".
    const errText = (data, res) => {
      const d = data && data.detail;
      if (typeof d === "string") return d;
      if (d != null) { try { return JSON.stringify(d); } catch (_) { return String(d); } }
      return "HTTP " + res.status;
    };

    marked.setOptions({ breaks: true });
    const escapeHtml = (s) => s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");

    // Render text as Markdown (bold/italics/lists) + LaTeX, safely.
    // LaTeX spans are stashed before Markdown runs so things like $m_1$ aren't
    // mangled by Markdown's underscore/asterisk handling, then restored for MathJax.
    function renderRich(el, text) {
      const math = [];
      const stash = (m) => "@@MATH" + (math.push(m) - 1) + "@@";
      // Collapse runs of blank lines so spacing is uniform, not "weird".
      const clean = (text || "").replace(/\r\n/g, "\n").replace(/\n{3,}/g, "\n\n").trim();
      const protectedText = clean
        .replace(/\$\$[\s\S]+?\$\$/g, stash)
        .replace(/\\\[[\s\S]+?\\\]/g, stash)
        .replace(/\\\([\s\S]+?\\\)/g, stash)
        .replace(/\$[^\n$]+?\$/g, stash);
      let html = DOMPurify.sanitize(marked.parse(protectedText));
      html = html.replace(/@@MATH(\d+)@@/g, (_, i) => escapeHtml(math[Number(i)]));
      el.innerHTML = html;
      if (window.MathJax && MathJax.typesetPromise) MathJax.typesetPromise([el]).catch(() => {});
    }

    // Render a preview: inline Markdown (bold/italic/code) + LaTeX. Block-only syntax
    // is normalized first — headings -> bold, horizontal rules dropped, blank lines
    // collapsed — so it reads cleanly instead of showing raw "###" / "---".
    function renderInline(el, text) {
      const math = [];
      const stash = (m) => "@@MATH" + (math.push(m) - 1) + "@@";
      const t = (text || "")
        .replace(/^\s{0,3}([-*_])(?:\s*\1){2,}\s*$/gm, "")       // drop --- / *** / ___ rules
        .replace(/^\s{0,3}#{1,6}\s+(.*?)\s*#*\s*$/gm, "**$1**")   // headings -> bold
        .replace(/\*\*\s*([^*\n]+?)\s*\*\*/g, "**$1**")           // trim spaces inside **bold**
        .replace(/\$\$[\s\S]+?\$\$/g, stash)
        .replace(/\\\[[\s\S]+?\\\]/g, stash)
        .replace(/\\\([\s\S]+?\\\)/g, stash)
        .replace(/\$[^\n$]+?\$/g, stash)
        .replace(/\n{2,}/g, "\n")                                 // collapse blank lines
        .replace(/\$[^$\n]*$/, "…")                               // drop a dangling, unclosed $…
        .trim();
      let html = DOMPurify.sanitize(marked.parseInline(t));
      html = html.replace(/@@MATH(\d+)@@/g, (_, i) => escapeHtml(math[Number(i)]));
      el.innerHTML = html;
      if (window.MathJax && MathJax.typesetPromise) MathJax.typesetPromise([el]).catch(() => {});
    }

    async function ask() {
      const question = $("question").value.trim();
      if (!question) return;
      if (!userId()) { $("answer").textContent = "請先使用 Google 登入。"; return; }
      $("askBtn").disabled = true;
      $("answer").textContent = "思考中…";
      try {
        const res = await fetch(API_BASE + "/api/query", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ user_id: userId(), question, top_k: 10 }),
        });
        const data = await res.json();
        if (res.ok) { renderRich($("answer"), data.answer); }
        else { $("answer").textContent = "錯誤：" + errText(data, res); }
      } catch (e) {
        $("answer").textContent = "請求失敗：" + e;
      } finally {
        $("askBtn").disabled = false;
      }
    }

    async function upload() {
      const file = $("file").files[0];
      if (!file) return;
      if (!userId()) { $("uploadResult").textContent = "請先使用 Google 登入再上傳。"; return; }
      $("uploadBtn").disabled = true;
      $("uploadResult").textContent = "上傳中…（圖片 / PDF 需呼叫 Gemini 產生描述，可能稍久）";
      const fd = new FormData();
      fd.append("user_id", userId());
      fd.append("file", file);
      try {
        const res = await fetch(API_BASE + "/api/upload", { method: "POST", body: fd });
        const data = await res.json();
        if (!res.ok) { $("uploadResult").textContent = "錯誤：" + errText(data, res); }
        else if (data.added === false) { $("uploadResult").textContent = data.id + " 已存在，跳過"; }
        else { $("uploadResult").textContent = data.id + " 已加入" + (data.description ? "（描述：" + data.description.slice(0, 60) + "…）" : ""); }
        loadNotes();
      } catch (e) {
        $("uploadResult").textContent = "上傳失敗：" + e;
      } finally {
        $("uploadBtn").disabled = false;
      }
    }

    async function loadNotes() {
      if (!userId()) {
        $("notes").innerHTML = "<li class='muted'>請先使用 Google 登入</li>";
        return;
      }
      const ul = $("notes");
      let notes;
      try {
        const res = await fetch(API_BASE + "/api/notes?user_id=" + encodeURIComponent(userId()));
        notes = await res.json();
      } catch (e) {
        ul.innerHTML = "<li class='muted'>載入筆記失敗，請稍後重試</li>";
        return;
      }
      ul.innerHTML = "";
      if (!Array.isArray(notes) || notes.length === 0) {
        ul.innerHTML = "<li class='muted'>（尚無筆記）</li>";
        return;
      }
      for (const n of notes) {
        const li = document.createElement("li");
        const meta = document.createElement("span");
        meta.className = "meta";
        const tag = document.createElement("span");
        tag.textContent = `[${n.type}] ${n.id} — `;
        const preview = document.createElement("span");
        renderInline(preview, n.preview);
        meta.appendChild(tag);
        meta.appendChild(preview);
        const del = document.createElement("button");
        del.className = "del";
        del.textContent = "刪除";
        del.addEventListener("click", () => deleteNote(n.id));
        li.appendChild(meta);
        li.appendChild(del);
        ul.appendChild(li);
      }
    }

    async function deleteNote(id) {
      if (!confirm(`確定要刪除「${id}」嗎？\n此動作無法復原。`)) return;
      try {
        const res = await fetch(
          API_BASE + "/api/notes/" + encodeURIComponent(id) + "?user_id=" + encodeURIComponent(userId()),
          { method: "DELETE" }
        );
        if (!res.ok) {
          const data = await res.json().catch(() => ({}));
          alert("刪除失敗：" + errText(data, res));
          return;
        }
        loadNotes();
      } catch (e) {
        alert("刪除失敗：" + e);
      }
    }

    // === Google 登入 (Google Identity Services) ===
    // 設定步驟：
    //   1. 到 https://console.cloud.google.com/ 建立 OAuth 2.0 用戶端 ID（網頁應用程式）。
    //   2. 在「已授權的 JavaScript 來源」加入此頁網址（例如 http://localhost:8000）。
    //   3. 把產生的用戶端 ID 貼到下面的 GOOGLE_CLIENT_ID。
    const GOOGLE_CLIENT_ID = "1068367879973-ps73rd0aoqr4u03cri4vomho72mh4qkm.apps.googleusercontent.com";

    // 解碼 Google ID token (JWT) 的 payload，取出 email / name（純前端，不需後端）。
    function decodeJwt(token) {
      const part = token.split(".")[1].replace(/-/g, "+").replace(/_/g, "/");
      const json = decodeURIComponent(
        atob(part).split("").map((c) => "%" + c.charCodeAt(0).toString(16).padStart(2, "0")).join("")
      );
      return JSON.parse(json);
    }

    // 設定目前使用者並更新畫面（登入成功或從上次登入還原時共用）。
    function setUser(email, label) {
      $("user").value = email;
      $("googleStatus").firstChild.textContent = label;
      $("signoutLink").style.display = "";
      $("answer").textContent = "";
      $("uploadResult").textContent = "";
      loadNotes();
    }

    // 登入成功：用 Google 帳號 Email 當作使用者 id，記住到 localStorage，
    // 之後重新整理頁面不必再登入一次。
    function handleGoogleCredential(response) {
      try {
        const info = decodeJwt(response.credential);
        if (!info.email) return;
        localStorage.setItem("nh_user", info.email);
        setUser(info.email, "已連結：" + info.email + (info.name ? "（" + info.name + "）" : ""));
      } catch (e) {
        $("googleStatus").textContent = "Google 登入解析失敗：" + e;
      }
    }

    $("signoutLink").addEventListener("click", (ev) => {
      ev.preventDefault();
      localStorage.removeItem("nh_user");
      location.reload();
    });

    // 還原上次登入的帳號（與 Google 登入同等信任層級：目前後端僅以 email 區分使用者）。
    const savedUser = localStorage.getItem("nh_user");
    if (savedUser) setUser(savedUser, "已連結（上次登入）：" + savedUser);

    function initGoogle() {
      if (!(window.google && google.accounts && google.accounts.id)) return;
      if (GOOGLE_CLIENT_ID.startsWith("YOUR_")) {
        $("googleStatus").textContent = "尚未設定 Google 用戶端 ID（請見 index.html 中的 GOOGLE_CLIENT_ID）。";
        return;
      }
      google.accounts.id.initialize({ client_id: GOOGLE_CLIENT_ID, callback: handleGoogleCredential });
      google.accounts.id.renderButton($("gsiButton"), { theme: "outline", size: "large", text: "signin_with", shape: "pill" });
    }
    window.addEventListener("load", initGoogle);

    $("askBtn").addEventListener("click", ask);
    $("uploadBtn").addEventListener("click", upload);
    $("refreshBtn").addEventListener("click", loadNotes);
    if (!savedUser) loadNotes();  // 已還原帳號時 setUser 已載入過
  </script>
</body>
</html>
